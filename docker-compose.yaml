services:
  livros-api:
    container_name: livros-api
    env_file:
      - .env
    build:
      context: .
      dockerfile: dev.Dockerfile
    ports:
      - "${PORT}:${PORT}"
    environment:
      - SPRING_PROFILES_ACTIVE=container
    depends_on:
      - app-database
    restart: always
    networks:
      - database-network

  app-database:
    image: postgres:17-alpine
    container_name: app-database
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - data_postgresql:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - database-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-application
    restart: always
    ports:
      - "4332:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ntconsult@application.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - app-database
    networks:
      - database-network

volumes:
  data_postgresql:

networks:
  database-network:
    driver: bridge

